name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e agri-brain-mvp-1.0.0/backend
          pip install pytest
      - name: Run backend tests
        run: |
          python -m pytest agri-brain-mvp-1.0.0/backend/pirag/tests agri-brain-mvp-1.0.0/backend/tests
      - name: Validate simulation results
        run: |
          python mvp/simulation/validation/validate_results.py
      - name: Run stochastic simulation smoke test
        run: |
          python mvp/simulation/tests/test_stochastic_quick.py

  contract-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agri-brain-mvp-1.0.0/contracts/hardhat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and test
        run: |
          npm install
          npx hardhat test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agri-brain-mvp-1.0.0/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  contract-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install hardhat deps
        working-directory: agri-brain-mvp-1.0.0/contracts/hardhat
        run: npm install
      - name: Run Slither static analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: agri-brain-mvp-1.0.0/contracts/hardhat
          slither-args: --exclude-informational --exclude-low
          fail-on: medium
          slither-version: 0.11.4
