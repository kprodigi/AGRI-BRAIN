name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # Cross-platform test suite. README documents Windows + macOS as
  # supported development platforms; the matrix proves it on every
  # push. Artifact-hash-sensitive steps (validate_results,
  # verify_manifest) live in the dedicated `artifact-validation`
  # job below — those rely on SHA-256s computed on the originating
  # filesystem (LF line endings), so cross-OS execution would false-
  # positive on the manifest hashes even though the simulator code
  # itself is cross-platform.
  backend-tests:
    name: backend-tests (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          # Install with the [dev] extra so httpx and pytest-asyncio are
          # available -- TestClient-based integration tests fail without
          # them. The "[dev]" form is a project optional-dependencies
          # group declared in pyproject.toml.
          pip install -e "agribrain/backend[dev]"
      - name: Run backend tests
        run: |
          python -m pytest agribrain/backend/pirag/tests agribrain/backend/tests
      - name: Run stochastic simulation smoke test
        run: |
          python mvp/simulation/tests/test_stochastic_quick.py

  # Ubuntu-only artifact validation: line-ending differences on Windows
  # checkouts would shift tracked-artifact SHA-256s and false-positive
  # the manifest verifier. The artifacts themselves were written and
  # hashed on Linux/HPC, so Linux CI is the canonical verification host.
  artifact-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          # Install with the [dev] extra so httpx and pytest-asyncio are
          # available -- TestClient-based integration tests fail without
          # them. The "[dev]" form is a project optional-dependencies
          # group declared in pyproject.toml.
          pip install -e "agribrain/backend[dev]"
      - name: Validate simulation results (strict gate, default)
        env:
          STRICT_VALIDATION: "1"
        run: |
          python mvp/simulation/validation/validate_results.py
      - name: Verify artifact manifest (strict commit, allow-missing in CI)
        # On CI we don't have the gitignored artifacts (mcp_interop_*,
        # traces_*); --allow-missing turns those into warnings instead of
        # errors so the strict git_commit pin and the SHA-256s of the
        # tracked artifacts still gate. The HPC delivery pipeline must
        # invoke verify_manifest WITHOUT --allow-missing to ensure every
        # promised artifact is present.
        run: |
          python mvp/simulation/analysis/verify_manifest.py --strict-commit --allow-missing
      - name: Deterministic-mode regression check
        env:
          DETERMINISTIC_MODE: "true"
          # Allow the guard to skip cleanly when a baseline snapshot is not
          # committed yet (e.g. first run on a new branch). Set this env var
          # to 0 in protected branches to make missing snapshots a hard
          # failure -- otherwise the only failure path the guard reports
          # (drift) still gates the build deterministically. The previous
          # `|| echo "..."` broad mask suppressed every failure mode
          # including drift; this scoped opt-in only suppresses the
          # missing-baseline branch.
          ALLOW_MISSING_BASELINE: "1"
        run: |
          python mvp/simulation/validation/run_regression_guard.py

  python-lint:
    name: python-lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.5,<1"
      - name: Run ruff (lint -- structural correctness gate)
        run: |
          # ruff.toml at repo root configures per-file ignores. We gate
          # on the rules that catch real defects rather than style:
          #   E9/F63/F7/F82  -- syntax errors and parse failures
          #   F401          -- unused imports (the review flagged these)
          #   F821          -- undefined names (catches refactor breakage)
          # Style rules (I import-sorting, B bug-prone patterns) are
          # intentionally not yet gated; they should be tightened in a
          # focused cleanup pass before turning them on as build gates.
          ruff check --select E9,F63,F7,F82,F401,F821 \
            agribrain/backend mvp/simulation

  contract-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agribrain/contracts/hardhat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and test
        run: |
          npm install
          npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agribrain/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  contract-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install hardhat deps
        working-directory: agribrain/contracts/hardhat
        run: npm install
      - name: Run Slither static analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: agribrain/contracts/hardhat
          slither-args: --exclude-informational --exclude-low
          fail-on: medium
          slither-version: 0.11.4
