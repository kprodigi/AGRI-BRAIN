name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e agri-brain-mvp-1.0.0/backend
          pip install pytest
      - name: Run backend tests
        run: |
          python -m pytest agri-brain-mvp-1.0.0/backend/pirag/tests

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: agri-brain-mvp-1.0.0/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: |
          npm install
          npm run build

